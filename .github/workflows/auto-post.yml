name: 🤖 Tistory Auto-Poster

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "포스팅 주제"
        required: true
        type: string
  schedule:
    - cron: "0 0 * * 1,3,5"

env:
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  TISTORY_BLOG:       ${{ secrets.TISTORY_BLOG }}
  NOTION_TOKEN:       ${{ secrets.NOTION_TOKEN }}
  NOTION_PAGE_ID:     ${{ secrets.NOTION_PAGE_ID }}
  DISCORD_WEBHOOK:    ${{ secrets.DISCORD_WEBHOOK }}
  HOME_SERVER_URL:    ${{ secrets.HOME_SERVER_URL }}
  WEBHOOK_SECRET:     ${{ secrets.WEBHOOK_SECRET }}
  POST_TOPIC:         ${{ github.event.inputs.topic || vars.DEFAULT_TOPIC }}

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python run.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-${{ github.run_number }}
          path: post_output.json
          retention-days: 7
