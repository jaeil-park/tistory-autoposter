name: 🤖 Tistory Auto-Poster

on:
  # ── 수동 트리거 (GitHub UI에서 주제 입력 가능) ──────────────
  workflow_dispatch:
    inputs:
      topic:
        description: "포스팅 주제 (예: LangChain FAISS 벡터 검색 구현)"
        required: true
        type: string
      category_id:
        description: "카테고리 ID (기본: 0 = 미분류)"
        required: false
        default: "0"
        type: string

  # ── 자동 스케줄 (매주 월·수·금 오전 9시 KST = UTC 0시) ─────
  schedule:
    - cron: "0 0 * * 1,3,5"

env:
  ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
  KAKAO_EMAIL:        ${{ secrets.KAKAO_EMAIL }}
  KAKAO_PASSWORD:     ${{ secrets.KAKAO_PASSWORD }}
  TISTORY_BLOG:       ${{ secrets.TISTORY_BLOG }}
  DISCORD_WEBHOOK:    ${{ secrets.DISCORD_WEBHOOK }}
  POST_TOPIC:         ${{ github.event.inputs.topic || vars.DEFAULT_TOPIC }}
  TISTORY_CATEGORY_ID: ${{ github.event.inputs.category_id || '0' }}

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. 코드 체크아웃 ──────────────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python 환경 설정 ───────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. 의존성 설치 ────────────────────────────────────────
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      # ── 4. 포스트 생성 + 발행 ─────────────────────────────────
      - name: 🚀 Generate & Publish Post
        run: python run.py
        env:
          POST_TOPIC: ${{ env.POST_TOPIC }}

      # ── 5. 아티팩트 저장 (생성된 포스트 JSON 보관) ───────────
      - name: 💾 Upload post artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-output-${{ github.run_number }}
          path: |
            post_output.json
            error_screenshot.png
          retention-days: 30

      # ── 6. 실패 시 Discord 알림 ───────────────────────────────
      - name: ❌ Notify failure
        if: failure()
        run: |
          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"❌ **티스토리 자동 포스팅 실패** (Run #${{ github.run_number }})\n주제: $POST_TOPIC\n로그: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
