name: 🤖 Tistory Auto-Poster

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "📝 블로그 주제 (일반 포스팅)"
        required: false
        type: string
      coupang_url:
        description: "🛍️ 쿠팡파트너스 링크"
        required: false
        type: string
      product_name:
        description: "📦 상품명 (쿠팡 포스팅 시 직접 입력)"
        required: false
        type: string
      product_price:
        description: "💰 가격 (예: 29,900원)"
        required: false
        type: string
      product_features:
        description: "✨ 상품 특징/장점 (쉼표로 구분)"
        required: false
        type: string
      post_type:
        description: "📋 글 유형"
        required: false
        default: "review"
        type: choice
        options: ["review", "viral", "sales"]
  schedule:
    - cron: "0 0 * * 1,3,5"

env:
  ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
  TISTORY_BLOG:        ${{ secrets.TISTORY_BLOG }}
  NOTION_TOKEN:        ${{ secrets.NOTION_TOKEN }}
  NOTION_PAGE_ID:      ${{ secrets.NOTION_PAGE_ID }}
  DISCORD_WEBHOOK:     ${{ secrets.DISCORD_WEBHOOK }}
  HOME_SERVER_URL:     ${{ secrets.HOME_SERVER_URL }}
  WEBHOOK_SECRET:      ${{ secrets.WEBHOOK_SECRET }}
  UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
  POST_TOPIC:          ${{ github.event.inputs.topic || vars.DEFAULT_TOPIC }}
  COUPANG_URL:         ${{ github.event.inputs.coupang_url || '' }}
  PRODUCT_NAME:        ${{ github.event.inputs.product_name || '' }}
  PRODUCT_PRICE:       ${{ github.event.inputs.product_price || '' }}
  PRODUCT_FEATURES:    ${{ github.event.inputs.product_features || '' }}
  POST_TYPE:           ${{ github.event.inputs.post_type || 'review' }}

jobs:
  auto-post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - run: python run.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: post-${{ github.run_number }}
          path: post_output.json
          retention-days: 7
